<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>냉키트 - 추천결과</title>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 400px; border: 1px solid #000; padding: 20px; }
        .card { border: 2px solid #333; margin-top: 10px; padding: 10px; display: flex; gap: 10px; }
        .img-box { width: 80px; height: 80px; background: #eee; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        button { width: 100%; padding: 10px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1 id="title">추천 레시피</h1>
        <p id="ingInfo"></p>
        <hr>
        <div id="list"></div>
        <button onclick="location.href='index.html'">← 다시 선택하기</button>
    </div>

    <script>
        // 음식 데이터 사전
        const recipes = {
            "한식": ["김치찌개 ⭐", "김치만두 ⭐⭐⭐", "김치찜 ⭐⭐"],
            "일식": ["연어초밥 ⭐⭐⭐", "돈카츠 ⭐⭐", "라멘 ⭐"],
            "중식": ["짜장면 ⭐⭐⭐", "짬뽕 ⭐⭐", "마파두부 ⭐"]
        };

        // 1. 아까 저장했던 값들 꺼내오기
        const userChoice = localStorage.getItem('userChoice') || "한식";
        const userIng = localStorage.getItem('userIng') || "없음";

        // 2. 제목이랑 재료 정보 표시
        document.getElementById('title').innerText = userChoice + " 추천 목록";
        document.getElementById('ingInfo').innerText = "내 재료: " + userIng;

        // 3. 선택된 종류에 맞춰서 카드 만들기
        const listDiv = document.getElementById('list');
        const foods = recipes[userChoice];

        foods.forEach(f => {
            listDiv.innerHTML += `
                <div class="card">
                    <div class="img-box">음식사진</div>
                    <div>
                        <h3 style="margin:0">${f}</h3>
                        <p style="font-size:12px; margin:5px 0;">조리 시작 버튼을 눌러보세요.</p>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
