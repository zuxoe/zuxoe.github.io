<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냉키트 - 추천 레시피</title>
    <style>
        body { font-family: 'sans-serif'; background: #f5f5f5; margin: 0; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; background: #fff; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* 헤더 */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 24px; font-weight: bold; color: #ffcc00; text-shadow: 1px 1px 1px #000; }
        
        /* 카드 스타일 */
        .recipe-list { padding: 15px; }
        .recipe-card { 
            display: flex; border: 2px solid #333; border-radius: 8px; 
            padding: 10px; margin-bottom: 15px; position: relative; background: #fafafa;
        }
        .food-img { 
            width: 100px; height: 100px; border: 1px solid #333; 
            display: flex; align-items: center; justify-content: center; font-size: 12px; background: #fff;
        }
        .info { margin-left: 15px; flex: 1; }
        .info h3 { margin: 0 0 5px 0; font-size: 18px; }
        .info p { margin: 3px 0; font-size: 13px; color: #555; }
        
        .bookmark { position: absolute; top: 10px; right: 10px; color: #f00; cursor: pointer; }
        
        .btn-group { display: flex; justify-content: flex-end; gap: 5px; margin-top: 10px; }
        .btn { border: 1px solid #333; background: #fff; padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: #eee; }

        .no-result { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <span>☰</span>
        <div class="logo">냉키트 😋</div>
        <span onclick="location.href='index.html'" style="cursor:pointer">🏠</span>
    </header>

    <div id="recipeContainer" class="recipe-list">
        </div>
</div>

<script>
    // 1. 가상의 레시피 데이터 (나중에 이 부분을 더 늘릴 수 있습니다)
    const recipes = [
        { id: 1, name: "김치찌개", type: "한식", stars: "⭐", ingredients: "김치, 돼지고기", method: "끓이기" },
        { id: 2, name: "김치만두", type: "한식", stars: "⭐⭐⭐", ingredients: "김치, 밀가루", method: "찌기" },
        { id: 3, name: "김치찜", type: "한식", stars: "⭐⭐", ingredients: "묵은지, 고기", method: "삶기" },
        { id: 4, name: "초밥", type: "일식", stars: "⭐⭐⭐", ingredients: "생선, 밥", method: "비빔" },
        { id: 5, name: "파스타", type: "양식", stars: "⭐⭐", ingredients: "면, 토마토소스", method: "볶음" }
    ];

    // 2. 이전 페이지에서 저장된 사용자의 선택 값 가져오기
    const userChoice = localStorage.getItem('userChoice') || "한식"; // 기본값 한식

    // 3. 필터링: 사용자 선택과 일치하는 레시피만 추출
    const filteredRecipes = recipes.filter(r => r.type === userChoice);

    // 4. 화면에 그리기
    const container = document.getElementById('recipeContainer');

    if (filteredRecipes.length === 0) {
        container.innerHTML = '<div class="no-result">조건에 맞는 레시피가 없습니다.</div>';
    } else {
        filteredRecipes.forEach(recipe => {
            const card = `
                <div class="recipe-card">
                    <div class="bookmark">🔖</div>
                    <div class="food-img">음식 사진</div>
                    <div class="info">
                        <h3>${recipe.name} <span style="font-size:14px">${recipe.stars}</span></h3>
                        <p>재료 : ${recipe.ingredients}</p>
                        <p>조리법 : ${recipe.method}</p>
                        <div class="btn-group">
                            <button class="btn">조리 시작</button>
                            <button class="btn">조리 종료</button>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    }
</script>

</body>
</html>
