<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>냉키트 - 메인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">냉키트 😋</h1>
        </header>

        <section class="question-section">
            <h3>1. 어떤 요리를 만들고 싶으신가요?</h3>
            <div class="options">
                <p>〈 종류 〉 
                    <label><input type="radio" name="type" value="한식"> 한식</label>
                    <label><input type="radio" name="type" value="일식"> 일식</label>
                    <label><input type="radio" name="type" value="중식"> 중식</label>
                    <label><input type="radio" name="type" value="양식"> 양식</label>
                </p>
                </div>

            <h3>2. 사용할 재료를 입력해주세요.</h3>
            <input type="text" id="ingredients" placeholder="예: 김치, 돼지고기, 두부">

            <h3>3. 세부적인 음식 취향을 입력해 주세요.</h3>
            <div class="detail-prefs">
                <input type="text" id="dislike-texture" placeholder="싫어하는 식감">
                <input type="text" id="dislike-item" placeholder="싫어하는 식재료">
                <input type="text" id="spicy-level" placeholder="선호하는 맵기 정도">
            </div>
        </section>

        <footer class="nav-buttons">
            <button onclick="saveAndNext()">다음 ➔</button>
        </footer>
    </div>

    <script>
        function saveAndNext() {
            // 선택된 값들 수집
            const selectedType = document.querySelector('input[name="type"]:checked')?.value || "전체";
            const ingredients = document.getElementById('ingredients').value;
            
            // 데이터 저장 (로컬 스토리지)
            const userData = {
                type: selectedType,
                ingredients: ingredients
            };
            localStorage.setItem('userChoice', JSON.stringify(userData));
            
            // 다음 페이지로 이동
            window.location.href = 'result.html';
        }
    </script>
</body>
</html>
